include:
  # 1. 接收器 (Dongle) - 作为主机
  # 必须使用原厂 Dongle 的主控型号，并在此处挂载 ZMK Studio 功能
  - board: nrf52840
    shield: charybdis_dongle
    snippet: studio-rpc-usb-uart

  # 2. 左手键盘 (Left) - 作为从机
  # 使用 nice_nano
  - board: nice_nano
    shield: charybdis_left

  # 3. 右手键盘 (Right) - 作为从机
  # 使用 nice_nano
  - board: nice_nano
    shield: charybdis_right

  # 4. 恢复出厂设置固件 (settings_reset) - 用于清空主控配对记录
  # 左右手通用，刷入后会清空蓝牙绑定
  - board: nice_nano
    shield: settings_reset
